<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Classic Snake</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <div class="status">
          <div>
            <p class="label">Score</p>
            <p class="value" id="score">0</p>
          </div>
          <div>
            <p class="label">Best</p>
            <p class="value" id="best-score">0</p>
          </div>
          <div>
            <p class="label">State</p>
            <p class="value" id="game-state">Ready</p>
          </div>
        </div>

        <div class="board-shell">
          <canvas
            id="game-board"
            width="400"
            height="400"
            aria-label="Snake game board"
          ></canvas>

          <div class="overlay" id="game-overlay" aria-live="polite">
            <div class="overlay-card">
              <p class="overlay-title" id="overlay-title">硫구역迦</p>
              <p class="overlay-text" id="overlay-text">
                邱객렘蕨숩샀듐샌렘蕨객큐역迦盧땡。
              </p>
              <button type="button" id="overlay-action">Start</button>
            </div>
          </div>
        </div>

        <div class="actions">
          <button type="button" id="toggle-button">Start</button>
          <button type="button" id="restart-button">Restart</button>
        </div>

        <div class="controls" aria-label="On-screen direction controls">
          <button type="button" data-direction="up">Up</button>
          <div class="controls-row">
            <button type="button" data-direction="left">Left</button>
            <button type="button" data-direction="down">Down</button>
            <button type="button" data-direction="right">Right</button>
          </div>
        </div>

        <p class="help">
          Use arrow keys or WASD to move. Press space to pause or resume.
        </p>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
